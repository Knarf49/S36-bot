version: "3.1"

rules:
- rule: Handle fallback
  steps:
  - intent: nlu_fallback
  - action: utter_fallback
- rule: Handle out_of_scope
  steps:
  - intent: out_of_scope
  - action: utter_fallback
- rule: order followup always
  steps:
  - intent: order_followup
  - action: action_order_followup
- rule: check order status always
  steps:
  - intent: check_order_status
  - action: action_check_order_status
