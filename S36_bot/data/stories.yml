    entities:
    - sender_name: "สมชาย"
    - sender_phone: "0812345678"
  - action: action_order_followup
  - intent: order_followup
    entities:
    - receiver_name: "มานี"
    - receiver_phone: "0891234567"
  - action: action_order_followup

