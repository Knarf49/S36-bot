  - action: action_calculate_shipping

- story: ask shipping missing province
  steps:
  - intent: ask_shipping
    entities:
    - weight: "5"
  - action: action_calculate_shipping

- story: ask shipping missing weight
  steps:
  - intent: ask_shipping
    entities:
    - province: "เชียงใหม่"
  - action: action_calculate_shipping

- story: ask shipping no info
  steps:
  - intent: ask_shipping
  - action: action_calculate_shipping

- story: shipping order full flow
  steps:
  - intent: ask_shipping
    entities:
    - province: "เชียงใหม่"
    - weight: "5"
  - action: action_calculate_shipping
  - intent: order_followup
    entities:
    - courier: "kerry"
  - action: action_order_followup
